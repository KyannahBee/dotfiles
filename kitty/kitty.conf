# kitty.conf — pixel art castle theme
# Install: pacman -S kitty

# ---- Shell ----
shell bash --login
# --login so ~/.bash_profile and ~/.bashrc are sourced properly

# ---- Font ----
font_family      JetBrains Mono NF
bold_font        JetBrains Mono NF Bold
italic_font      JetBrains Mono NF Italic
bold_italic_font JetBrains Mono NF Bold Italic
font_size        11.0

# Uncomment to use a pixel bitmap font instead:
# font_family      Creep2
# font_size        16.0

# Pixel-sharp rendering — disable all smoothing
# (bitmap fonts need this; JetBrains Mono looks fine either way)
# force_ltr no

# ---- Cursor ----
cursor                  #c87fa0
cursor_text_color       #1a1624
cursor_shape            block
cursor_blink_interval   0

# ---- Scrollback ----
scrollback_lines 10000

# ---- Mouse ----
copy_on_select          no
strip_trailing_spaces   smart
focus_follows_mouse     yes

# ---- Window ----
# No titlebar decoration — sway handles borders
hide_window_decorations yes
window_padding_width    6
placement_strategy      center

# ---- Tab bar (if you use kitty tabs) ----
tab_bar_style           powerline
tab_powerline_style     angled
tab_bar_background      #1a1624
tab_bar_margin_color    #1a1624
active_tab_foreground   #1a1624
active_tab_background   #c87fa0
inactive_tab_foreground #a899b8
inactive_tab_background #2e2640
active_tab_font_style   bold

# ---- Colors — wallpaper palette ----
# Dark purple night sky
background              #1a1624
foreground              #e8dff0

selection_background    #2e2640
selection_foreground    #e8dff0

# Black / dark gray
color0                  #1a1624
color8                  #2e2640

# Red → pink (castle trim / accent)
color1                  #c87fa0
color9                  #e8a0c0

# Green → teal (tree canopy)
color2                  #4a9e8a
color10                 #6ab8a8

# Yellow → soft purple (cloud highlights)
color3                  #a08bc0
color11                 #c0a8e8

# Blue → water blue
color4                  #3d4a7a
color12                 #5a6aa0

# Magenta → pink (same as red, intentional — warm accent)
color5                  #c87fa0
color13                 #e8a0c0

# Cyan → teal (same as green, intentional — cool accent)
color6                  #4a9e8a
color14                 #6ab8a8

# White → stone (castle walls)
color7                  #c8bfd8
color15                 #e8dff0

# ---- URL handling ----
url_color               #4a9e8a
url_style               single
open_url_with           firefox

# ---- Performance ----
repaint_delay           8
input_delay             2
sync_to_monitor         yes

# ---- Keyboard shortcuts ----
# Keep kitty defaults, add a few useful ones
map ctrl+shift+c        copy_to_clipboard
map ctrl+shift+v        paste_from_clipboard
map ctrl+shift+t        new_tab
map ctrl+shift+w        close_tab
map ctrl+shift+equal    change_font_size all +1.0
map ctrl+shift+minus    change_font_size all -1.0
map ctrl+shift+0        change_font_size all 0
map ctrl+shift+f        show_scrollback
